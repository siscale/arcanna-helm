apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  labels:
    {{- include "arcanna-redis.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 6379
      name: redis
  selector:
    {{- include "arcanna-redis.selectorLabels" . | nindent 4 }}
