apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "arcanna-redis.fullname" . }}
  labels:
    {{- include "arcanna-redis.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "arcanna-redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "arcanna-redis.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - >-
              redis-server
              --save {{ .Values.config.save }}
              --loglevel {{ .Values.config.loglevel }}
              --maxmemory-policy {{ .Values.config.maxmemoryPolicy }}
              --requirepass "$REDIS_PASS"
              --dir /data
          ports:
            - containerPort: 6379
              name: redis
          env:
            - name: REDIS_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: password
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASS" ping | grep -q PONG
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASS" ping | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "arcanna-redis.fullname" . }}-data
      {{- end }}
