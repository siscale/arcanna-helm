apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "monitoring.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "monitoring.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      initContainers:
        {{- if .Values.filebeat.enabled }}
        - name: log-shipper-cleanup
          image: {{ .Values.filebeat.image }}
          securityContext:
            runAsUser: 0
          command: ['sh', '-c', 'rm -rf /arcanna-log/filebeat.lock']
          volumeMounts:
            - name: monitoring-log-volume
              mountPath: /arcanna-log
        {{- end }}
      containers:
        # ── Monitoring API ────────────────────────────────────────
        - name: monitoring-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
              name: api-port
          env:
            - name: MONITORING_PORT
              value: {{ .Values.api.port | quote }}
            - name: COMPONENT_TYPE
              value: {{ .Values.api.componentType | quote }}
            - name: DEPLOYMENT_TYPE
              value: "k8s-deployment"
            - name: IMAGE_TAG
              value: {{ .Values.image.tag | quote }}
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            {{- include "monitoring.secretEnvVars" . | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.api.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.api.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: monitoring-log-volume
              mountPath: /opt/arcanna/log
            - name: main-config
              mountPath: /opt/arcanna/config/main/main.config
              subPath: main.config
            - name: monitoring-api-config
              mountPath: /opt/arcanna/config/monitoring_api/monitoring_api.config
              subPath: monitoring_api.config
        # ── Monitoring Shipper ────────────────────────────────────
        - name: monitoring-shipper
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.shipper.port }}
              name: index-logs-port
          env:
            - name: MONITORING_PORT
              value: {{ .Values.shipper.port | quote }}
            - name: COMPONENT_TYPE
              value: {{ .Values.shipper.componentType | quote }}
            - name: DEPLOYMENT_TYPE
              value: "k8s-deployment"
            - name: IMAGE_TAG
              value: {{ .Values.image.tag | quote }}
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            {{- include "monitoring.secretEnvVars" . | nindent 12 }}
          resources:
            {{- toYaml .Values.shipper.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.shipper.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.shipper.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: monitoring-log-volume
              mountPath: /opt/arcanna/log
            - name: main-config
              mountPath: /opt/arcanna/config/main/main.config
              subPath: main.config
            - name: monitoring-shipper-config
              mountPath: /opt/arcanna/config/monitoring_shipper/monitoring_shipper.config
              subPath: monitoring_shipper.config
        # ── Filebeat sidecar ──────────────────────────────────────
        {{- if .Values.filebeat.enabled }}
        - name: log-shipper
          image: {{ .Values.filebeat.image }}
          imagePullPolicy: Always
          securityContext:
            runAsUser: 0
          resources:
            {{- toYaml .Values.filebeat.resources | nindent 12 }}
          volumeMounts:
            - name: monitoring-log-volume
              mountPath: /arcanna-log
            - name: filebeat-shipper-config
              mountPath: /usr/share/filebeat/filebeat.yml
              subPath: filebeat.yml
        {{- end }}
      volumes:
        - name: monitoring-log-volume
          persistentVolumeClaim:
            claimName: monitoring-log-pvc
        - name: main-config
          configMap:
            name: main-config
        - name: monitoring-api-config
          configMap:
            name: monitoring-api-config
        - name: monitoring-shipper-config
          configMap:
            name: monitoring-shipper-config
        {{- if .Values.filebeat.enabled }}
        - name: filebeat-shipper-config
          configMap:
            name: {{ .Values.filebeat.configMapName }}
        {{- end }}
