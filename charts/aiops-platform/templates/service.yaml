apiVersion: v1
kind: Service
metadata:
  name: aiops-platform
  labels:
    {{- include "aiops-platform.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
      protocol: TCP
  selector:
    {{- include "aiops-platform.selectorLabels" . | nindent 4 }}
{{- if .Values.service.nodePort.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-platform-svc
  labels:
    {{- include "aiops-platform.labels" . | nindent 4 }}
spec:
  type: NodePort
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
      nodePort: {{ .Values.service.nodePort.port }}
      protocol: TCP
  selector:
    {{- include "aiops-platform.selectorLabels" . | nindent 4 }}
{{- end }}
