apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: {{ .Values.clusterName }}
  labels:
    {{- include "arcanna-elasticsearch.labels" . | nindent 4 }}
spec:
  version: {{ .Values.version }}
  nodeSets:
  {{- range .Values.nodeSets }}
  - name: {{ .name }}
    count: {{ .count }}
    config:
      {{- toYaml .config | nindent 6 }}
    podTemplate:
      spec:
        containers:
          - name: elasticsearch
            env:
              - name: ES_JAVA_OPTS
                value: {{ .javaOpts | quote }}
            resources:
              {{- toYaml .resources | nindent 14 }}
        initContainers:
          - name: sysctl
            securityContext:
              privileged: true
              runAsUser: 0
            command: ['sh', '-c', 'sysctl -w vm.max_map_count=262144']
    volumeClaimTemplates:
      - metadata:
          name: elasticsearch-data
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: {{ .storage.size }}
          {{- if .storage.storageClassName }}
          storageClassName: {{ .storage.storageClassName }}
          {{- end }}
  {{- end }}
