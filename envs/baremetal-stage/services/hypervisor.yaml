serviceName: hypervisor
componentType: hypervisor
port: 8000

image:
  repository: gcr.io/siscale-aiops/component-webservice

resources:
  requests:
    cpu: "150m"
    memory: "64Mi"
  limits:
    cpu: "2000m"
    memory: "2048Mi"

# Hypervisor keeps shared state on a data volume — often on a different
# storage class than logs (e.g. NFS for RWX, while logs stay on local LVM).
# Change storageClassName here to switch to NFS or another backend.
dataVolume:
  enabled: true
  mountPath: /opt/arcanna/data
  size: 10Gi
  storageClassName: sc-stage

logVolume:
  size: 2Gi

extraConfig:
  enabled: true
  name: hypervisor-config
  mountPath: /opt/arcanna/config/hypervisor/hypervisor.config
  subPath: hypervisor.config
