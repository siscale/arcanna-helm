# arcanna-rag has its own PVCs for vector store + logs.
# These are arcanna-rag-specific, not shared defaults — override here
# if you need a different storage class for the RAG data.
storagePvc:
  storageClassName: sc-stage

logPvc:
  storageClassName: sc-stage

